name: 🐛 Bug report
description: Report a problem with the Sajda platform
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public site
        - Customer portal
        - Admin panel
        - CMS (/cms)
        - Booking / payments
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, device, URL (production / local)
